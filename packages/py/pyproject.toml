[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "br-kit"
version = "0.1.0"
description = "Zero-dependency Brazilian document utils — CPF, CNPJ (alphanumeric-ready), CEP, phone, currency, dates. Mirrored TypeScript + Python APIs."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Victor Hugo" }]
keywords = ["brazil", "brasil", "cpf", "cnpj", "cep", "validation", "validator", "zero-dependency"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
    "Natural Language :: Portuguese (Brazilian)",
    "Topic :: Software Development :: Libraries",
]
dependencies = []

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.6", "mypy>=1.11"]

[project.urls]
Homepage = "https://github.com/victorhugo/br-kit"
Source = "https://github.com/victorhugo/br-kit"
"Bug Tracker" = "https://github.com/victorhugo/br-kit/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/br_kit"]

[tool.ruff]
line-length = 100
target-version = "py310"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.10"
strict = true
files = ["src"]
