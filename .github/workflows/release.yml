name: Release

# Publishes br-kit to npm and PyPI when a version tag is pushed.
#
# Authentication is OIDC trusted publishing on BOTH registries — there are NO
# long-lived tokens stored as repository secrets. Each publish uses a
# short-lived, workflow-scoped credential, and provenance / attestations are
# attached automatically.
#
# One-time setup before the first OIDC release — see RELEASING.md:
#   • npm:  add a Trusted Publisher to the package (requires the package to
#           already exist, so v0.1.0 is bootstrapped locally once).
#   • PyPI: add a Pending Publisher (works for brand-new projects, no token).

on:
  push:
    tags: ["v*"]

# Least privilege by default; each job opts into exactly what it needs.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 1. Never publish a red build — run the full CI gate first.
  verify:
    uses: ./.github/workflows/ci.yml

  # 2. The tag must match the version declared in BOTH package manifests.
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TS=$(node -p "require('./packages/ts/package.json').version")
          PY=$(grep -m1 '^version' packages/py/pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$TAG ts=$TS py=$PY"
          if [ "$TAG" != "$TS" ] || [ "$TAG" != "$PY" ]; then
            echo "::error::tag v$TAG does not match package versions (ts=$TS, py=$PY)"
            exit 1
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

  # 3. npm — OIDC trusted publishing (provenance attached automatically).
  npm:
    needs: [verify, check-version]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC — no NODE_AUTH_TOKEN secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest # trusted publishing requires npm >= 11.5.1
      - run: npm ci
      - run: npm run build --workspace packages/ts
      - name: Publish to npm (idempotent)
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          if npm view "br-kit@$VERSION" version >/dev/null 2>&1; then
            echo "br-kit@$VERSION already on npm — skipping"
            exit 0
          fi
          npm publish --provenance --access public --workspace packages/ts

  # 4. PyPI — OIDC trusted publishing (PEP 740 attestations attached).
  pypi:
    needs: [verify, check-version]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC — no PyPI API token secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build packages/py
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/py/dist/
          skip-existing: true # safe re-runs; never errors on an already-published version

  # 5. Cut a GitHub Release from the (signed) tag. No third-party action.
  github-release:
    needs: [npm, pypi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists — skipping"
            exit 0
          fi
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --verify-tag \
            --notes "npm: https://www.npmjs.com/package/br-kit/v/${GITHUB_REF_NAME#v} · PyPI: https://pypi.org/project/br-kit/${GITHUB_REF_NAME#v}/ · Changelog: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md"
